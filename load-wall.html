<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Load tuong.glb</title>
	<style>
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		#renderCanvas {
			width: 100%;
			height: 100%;
			touch-action: none;
			display: block;
		}
	</style>
</head>
<body>
	<canvas id="renderCanvas"></canvas>

	<script src="https://cdn.babylonjs.com/babylon.js"></script>
	<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

	<script>
		const canvas = document.getElementById("renderCanvas");
		const engine = new BABYLON.Engine(canvas, true);
		let refitCameraOnResize = null;

		const createScene = async () => {
			const scene = new BABYLON.Scene(engine);
			scene.clearColor = new BABYLON.Color4(0.85, 0.9, 1, 1);

			const camera = new BABYLON.ArcRotateCamera(
				"camera",
				-Math.PI / 2,
				Math.PI / 3,
				18,
				new BABYLON.Vector3(0, 2, 0),
				scene
			);
			camera.attachControl(canvas, true);
			camera.lowerRadiusLimit = 4;
			camera.upperRadiusLimit = 200;

			const hemiLight = new BABYLON.HemisphericLight(
				"hemiLight",
				new BABYLON.Vector3(0, 1, 0),
				scene
			);
			hemiLight.intensity = 0.9;

			const dirLight = new BABYLON.DirectionalLight(
				"dirLight",
				new BABYLON.Vector3(-0.4, -1, -0.4),
				scene
			);
			dirLight.position = new BABYLON.Vector3(10, 20, 10);
			dirLight.intensity = 0.6;

			const ground = BABYLON.MeshBuilder.CreateGround(
				"ground",
				{ width: 40, height: 40 },
				scene
			);
			const groundMaterial = new BABYLON.StandardMaterial("groundMaterial", scene);
			groundMaterial.diffuseColor = new BABYLON.Color3(0.25, 0.35, 0.25);
			groundMaterial.specularColor = BABYLON.Color3.Black();
			ground.material = groundMaterial;
			const groundY = ground.getBoundingInfo().boundingBox.maximumWorld.y;

			const getWorldBounds = (meshes) => {
				const min = new BABYLON.Vector3(Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY);
				const max = new BABYLON.Vector3(Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY);

				meshes.forEach((mesh) => {
					mesh.computeWorldMatrix(true);
					const info = mesh.getBoundingInfo().boundingBox;
					min.minimizeInPlace(info.minimumWorld);
					max.maximizeInPlace(info.maximumWorld);
				});

				return { min, max };
			};

			const placeModelOnGround = (rootNode, meshes) => {
				rootNode.computeWorldMatrix(true);
				let { min, max } = getWorldBounds(meshes);
				const centerX = (min.x + max.x) * 0.5;
				const centerZ = (min.z + max.z) * 0.5;

				rootNode.position.x -= centerX;
				rootNode.position.z -= centerZ;

				({ min, max } = getWorldBounds(meshes));
				rootNode.position.y += groundY - min.y + 0.01;

				({ min, max } = getWorldBounds(meshes));
				return { min, max };
			};

			const fitCameraToBounds = (min, max, margin = 1.15) => {
				const center = min.add(max).scale(0.5);
				camera.target.copyFrom(center);

				const sphereRadius = Math.max(max.subtract(min).length() * 0.5, 0.1);
				const vfov = camera.fov;
				const aspect = engine.getRenderWidth() / engine.getRenderHeight();
				const hfov = 2 * Math.atan(Math.tan(vfov * 0.5) * aspect);
				const limitingFov = Math.min(vfov, hfov);
				const requiredRadius = (sphereRadius / Math.sin(limitingFov * 0.5)) * margin;
				camera.radius = BABYLON.Scalar.Clamp(requiredRadius, camera.lowerRadiusLimit, camera.upperRadiusLimit);

				const savedMin = min.clone();
				const savedMax = max.clone();
				const savedMargin = margin;
				refitCameraOnResize = () => {
					fitCameraToBounds(savedMin, savedMax, savedMargin);
				};
			};

			const result = await BABYLON.SceneLoader.ImportMeshAsync(
				"",
				"./assets/",
				"tuong.glb",
				scene
			);

			const root = new BABYLON.TransformNode("tuongRoot", scene);
			result.meshes.forEach((mesh) => {
				if (!mesh.parent) {
					mesh.parent = root;
				}
			});

			root.rotation = new BABYLON.Vector3(Math.PI / 2, 0, 0);
			root.computeWorldMatrix(true);

			const childMeshes = result.meshes
				.filter((mesh) => mesh.getTotalVertices() > 0);

			if (childMeshes.length > 0) {
				let { min, max } = placeModelOnGround(root, childMeshes);
				fitCameraToBounds(min, max);

				const iceResult = await BABYLON.SceneLoader.ImportMeshAsync(
					"",
					"./assets/",
					"Ice.glb",
					scene
				);

				const iceRoot = new BABYLON.TransformNode("iceRoot", scene);
				iceResult.meshes.forEach((mesh) => {
					if (!mesh.parent) {
						mesh.parent = iceRoot;
					}
				});

				iceRoot.rotation = BABYLON.Vector3.Zero();
				const iceMeshes = iceResult.meshes.filter((mesh) => mesh.getTotalVertices() > 0);

				if (iceMeshes.length > 0) {
					placeModelOnGround(iceRoot, iceMeshes);

					const wallBounds = getWorldBounds(childMeshes);
					const contactGap = 0.02;

					iceRoot.position.x = 0;
					const iceBounds = getWorldBounds(iceMeshes);
					const deltaZ = wallBounds.max.z + contactGap - iceBounds.min.z;
					iceRoot.position.z += deltaZ;

					const allMin = BABYLON.Vector3.Minimize(wallBounds.min, getWorldBounds(iceMeshes).min);
					const allMax = BABYLON.Vector3.Maximize(wallBounds.max, getWorldBounds(iceMeshes).max);
					fitCameraToBounds(allMin, allMax, 1.2);
				}
			}

			return scene;
		};

		createScene().then((scene) => {
			engine.runRenderLoop(() => {
				scene.render();
			});
		});

		window.addEventListener("resize", () => {
			engine.resize();
			if (refitCameraOnResize) {
				refitCameraOnResize();
			}
		});
	</script>
</body>
</html>
